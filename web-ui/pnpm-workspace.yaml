# pnpm settings (pnpm 10 reads config here; this is not a multi-package
# workspace).
#
# The @forge/* deps are git-subdir deps pinned to a forge rev (same convention
# as the wcl/wscript pins in Cargo.toml). They build on install via their
# `prepare` (tsup) scripts, and pnpm ≥10.26 only allows a git dep to run
# prepare when its RESOLVED url is allowlisted below — so the rev appears both
# in package.json and here. Bump both together: `just web-ui-forge-bump REV`.
onlyBuiltDependencies:
  - "@forge/tokens@https://codeload.github.com/wiltaylor/forge/tar.gz/d513b163c92fdc95d413301f437cfb80ffab2fa7#path:packages/tokens"
  - "@forge/ui@https://codeload.github.com/wiltaylor/forge/tar.gz/d513b163c92fdc95d413301f437cfb80ffab2fa7#path:packages/ui"
  - "@forge/code@https://codeload.github.com/wiltaylor/forge/tar.gz/d513b163c92fdc95d413301f437cfb80ffab2fa7#path:packages/code"
  - "@forge/desktop@https://codeload.github.com/wiltaylor/forge/tar.gz/d513b163c92fdc95d413301f437cfb80ffab2fa7#path:packages/desktop"
# @forge/ui declares `"@forge/tokens": "workspace:^"`, which packs to ^0.1.0 —
# that would resolve against npmjs, where the @forge scope is someone else's.
# Force every @forge/tokens reference onto the git dep.
overrides:
  '@forge/tokens': 'github:wiltaylor/forge#d513b163c92fdc95d413301f437cfb80ffab2fa7&path:packages/tokens'
